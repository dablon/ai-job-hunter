services:
  job-hunter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-hunter
    volumes:
      - ./config:/app/data
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/data/config.json
      - PENDING_JOBS_PATH=/app/data/pending_jobs.json
      - SENT_URLS_PATH=/app/data/sent_urls.json
    # Run once (for cron scheduling, trigger manually or via CI)
    # To schedule daily runs, use external cron or GitHub Actions
    profiles:
      - run

  # Development shell for debugging
  shell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-hunter-shell
    volumes:
      - ./config:/app/data
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/data/config.json
      - PENDING_JOBS_PATH=/app/data/pending_jobs.json
      - SENT_URLS_PATH=/app/data/sent_urls.json
    entrypoint: ["/bin/bash"]
    profiles:
      - dev
