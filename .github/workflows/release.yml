name: Release Pipeline

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version (e.g., v1.2.0)'
        required: false

jobs:
  # ========== AUTO VERSION ==========
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_new_tag: ${{ steps.version.outputs.is_new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Manual version override
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_NEW="true"
          else
            # Auto-bump from commits
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [ -n "$LAST_TAG" ]; then
              LAST_TAG="${LAST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"

              # Check if we have commits since last tag
              if git rev-parse "v$LAST_TAG" >/dev/null 2>&1; then
                COMMITS=$(git log --pretty=format:"%s" "v$LAST_TAG..HEAD" --no-merges 2>/dev/null || echo "")
              else
                COMMITS=""
              fi

              if echo "$COMMITS" | grep -qiE "^(feat|feature)[:\(]"; then
                BUMP="minor"
              elif echo "$COMMITS" | grep -qiE "BREAKING CHANGE|break:"; then
                BUMP="major"
              else
                BUMP="patch"
              fi

              case $BUMP in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
              esac

              VERSION="$MAJOR.$MINOR.$PATCH"
              IS_NEW="true"
            else
              # First release
              VERSION="1.0.0"
              IS_NEW="true"
            fi
          fi

          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "is_new_tag=$IS_NEW" >> $GITHUB_OUTPUT
          echo "Version: v$VERSION, new: $IS_NEW"

  # ========== BUILD MULTIPLATFORM ==========
  build:
    needs: version
    if: needs.version.outputs.is_new_tag == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - os: macos-latest
            python-version: '3.12'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.version }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine pytest

      - name: Run tests
        run: |
          pip install -e ".[dev]"
          pytest -v

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          twine check dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/
          retention-days: 1

  # ========== CREATE GITHUB RELEASE ==========
  release:
    needs: [version, build]
    if: needs.version.outputs.is_new_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.version }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: List files
        run: ls -la artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG_NAME="${VERSION#v}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG..HEAD" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -n 20)
          fi

          cat << EOF > changelog.md
          ## What's Changed
          $CHANGES

          **Full Changelog**: https://github.com/dablon/ai-job-hunter/compare/$PREV_TAG...$VERSION
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: Release ${{ needs.version.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, 'beta') || contains(needs.version.outputs.version, 'alpha') }}
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== PUBLISH TO PYPI ==========
  publish:
    needs: [version, release]
    if: needs.version.outputs.is_new_tag == 'true'
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

  # ========== PUSH TAG (if not exists) ==========
  tag:
    needs: version
    if: needs.version.outputs.is_new_tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push tag
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG_NAME="${VERSION#v}"

          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v$TAG_NAME" -m "Release v$TAG_NAME"
            git push origin "v$TAG_NAME"
            echo "Pushed tag: v$TAG_NAME"
          else
            echo "Tag v$TAG_NAME already exists"
          fi
