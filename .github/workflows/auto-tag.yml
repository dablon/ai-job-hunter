name: Auto Tag

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          # Get latest tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            LAST_TAG="${LAST_TAG#v}"
            echo "Current latest tag: v$LAST_TAG"

            # Parse version
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"

            # Determine bump type from commits
            COMMITS=$(git log --pretty=format:"%s" "$LAST_TAG..HEAD" --no-merges)

            BUMP="patch"

            if echo "$COMMITS" | grep -qiE "^(feat|feature)[:\(]"; then
              BUMP="minor"
            fi

            if echo "$COMMITS" | grep -qiE "^BREAKING CHANGE|break:"; then
              BUMP="major"
            fi

            # Manual override
            if [ -n "${{ github.event.inputs.bump }}" ]; then
              BUMP="${{ github.event.inputs.bump }}"
            fi

            case $BUMP in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          else
            echo "No previous tags found, starting at v1.0.0"
            NEW_VERSION="1.0.0"

            if [ -n "${{ github.event.inputs.bump }}" ]; then
              case "${{ github.event.inputs.bump }}" in
                major)
                  NEW_VERSION="2.0.0"
                  ;;
                minor)
                  NEW_VERSION="1.1.0"
                  ;;
                patch)
                  NEW_VERSION="1.0.1"
                  ;;
              esac
            fi
          fi

          echo "New version: v$NEW_VERSION"
          echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${VERSION#v}"

          # Check if tag already exists
          if git rev-parse "v$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag v$TAG_NAME already exists, skipping..."
          else
            echo "Creating tag: v$TAG_NAME"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v$TAG_NAME" -m "Release v$TAG_NAME"
            git push origin "v$TAG_NAME"
          fi
